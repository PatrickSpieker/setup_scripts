runtime: apple
grants:
  - claude
  - github

hooks:
  post_build: git clone https://github.com/PatrickSpieker/setup_scripts.git /tmp/setup-scripts && mkdir -p ~/.claude/skills && ln -sn /tmp/setup-scripts/skills ~/.claude/skills
  pre_run: cp /tmp/setup-scripts/hooks/pre-push /workspace/.git/hooks/pre-push && chmod +x /workspace/.git/hooks/pre-push

command:
  - claude
  - --dangerously-skip-permissions
