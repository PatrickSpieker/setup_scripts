runtime: apple
dependencies:
  - python
grants:
  - claude
  - github
  - ssh:github.com

mcp:
  - name: linear
    url: https://mcp.linear.app/mcp
    auth:
      grant: mcp-linear
      header: Bearer
env:
  GIT_CONFIG_GLOBAL: "/tmp/.gitconfig-isolated"
  GIT_CONFIG_SYSTEM: "/tmp/.gitsystem-isolated"

hooks:
  post_build: touch /tmp/.gitconfig-isolated /tmp/.gitsystem-isolated && git config --global http.proxyAuthMethod basic
  pre_run: git clone https://github.com/PatrickSpieker/setup_scripts.git /tmp/setup-scripts && bash /tmp/setup-scripts/scripts/bootstrap_agent_homes.sh /tmp/setup-scripts && cp /tmp/setup-scripts/defaults/codex-moat-config.toml ~/.codex/config.toml && git -C /workspace config extensions.worktreeConfig true && git -C /workspace config --worktree core.hooksPath /tmp/setup-scripts/hooks
