runtime: apple
dependencies:
  - python
grants:
  - claude
  - github

hooks:
  pre_run: gh repo clone PatrickSpieker/setup_scripts /tmp/setup-scripts && mkdir -p ~/.claude && ln -sfn /tmp/setup-scripts/skills ~/.claude/skills && cp /tmp/setup-scripts/defaults/settings.json ~/.claude/settings.json && git -C /workspace config extensions.worktreeConfig true && git -C /workspace config --worktree core.hooksPath /tmp/setup-scripts/hooks
