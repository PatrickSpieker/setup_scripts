runtime: apple
dependencies:
  - python
grants:
  - claude
  - github
  - ssh:github.com

mcp:
  - name: linear
    url: https://mcp.linear.app/mcp
    auth:
      grant: mcp-linear
      header: Bearer

claude:
  mcp:
    playwright:
      command: /tmp/setup-scripts/scripts/playwright-mcp.sh
      args: ["--headless", "--isolated", "--no-sandbox"]

env:
  GIT_CONFIG_GLOBAL: "/tmp/.gitconfig-isolated"
  GIT_CONFIG_SYSTEM: "/tmp/.gitsystem-isolated"
  IN_MOAT: "1"

hooks:
  post_build_root: npx -y playwright@latest install-deps chromium
  post_build: touch /tmp/.gitconfig-isolated /tmp/.gitsystem-isolated && git config --global http.proxyAuthMethod basic && npx -y playwright@latest install chromium && npx -y @playwright/mcp@latest --help >/dev/null 2>&1
  pre_run: git clone https://github.com/PatrickSpieker/setup_scripts.git /tmp/setup-scripts && bash /tmp/setup-scripts/scripts/bootstrap_agent_homes.sh /tmp/setup-scripts --moat && cp /tmp/setup-scripts/defaults/codex-moat-config.toml ~/.codex/config.toml && git -C /workspace config extensions.worktreeConfig true && git -C /workspace config --worktree core.hooksPath /tmp/setup-scripts/hooks
