runtime: apple
dependencies:
  - python
grants:
  - claude
  - github
  - ssh:github.com

hooks:
  post_build: git clone git@github.com:PatrickSpieker/setup_scripts.git /tmp/setup-scripts && mkdir -p ~/.claude && ln -sfn /tmp/setup-scripts/skills ~/.claude/skills && cp /tmp/setup-scripts/defaults/settings.json ~/.claude/settings.json
  pre_run: git -C /workspace config extensions.worktreeConfig true && git -C /workspace config --worktree core.hooksPath /tmp/setup-scripts/hooks
