runtime: docker
credentials:
  - anthropic
  - github

mounts:
  - source: .
    target: /workspace

setup: |
  # Pull in personal Claude skills from setup_scripts
  git clone https://github.com/pspieker/setup-scripts.git /tmp/setup-scripts
  mkdir -p ~/.claude/skills
  ln -sn /tmp/setup-scripts/skills ~/.claude/skills

  # Pre-push hook: block pushes to main/master
  mkdir -p /workspace/.git/hooks
  cat > /workspace/.git/hooks/pre-push << 'HOOK'
  #!/usr/bin/env bash
  while read local_ref local_sha remote_ref remote_sha; do
    if [[ "$remote_ref" =~ refs/heads/(main|master)$ ]]; then
      echo "ERROR: Pushing to main/master is blocked in moat containers."
      exit 1
    fi
  done
  HOOK
  chmod +x /workspace/.git/hooks/pre-push

command: claude --dangerously-skip-permissions
