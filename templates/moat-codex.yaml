runtime: apple
dependencies:
  - python
grants:
  - openai
  - github
  - ssh:github.com

codex:
  mcp:
    playwright:
      command: /tmp/setup-scripts/scripts/playwright-mcp.sh
      args: []

env:
  IN_MOAT: "1"

hooks:
  post_build_root: npx -y playwright@latest install-deps chromium
  post_build: git config --global http.proxyAuthMethod basic && git clone https://github.com/PatrickSpieker/setup_scripts.git /tmp/setup-scripts && bash /tmp/setup-scripts/scripts/bootstrap_agent_homes.sh /tmp/setup-scripts && cp /tmp/setup-scripts/defaults/codex-moat-config.toml ~/.codex/config.toml && npx -y playwright@latest install chromium && npx -y @playwright/mcp@latest --help >/dev/null 2>&1
  pre_run: git -C /workspace config extensions.worktreeConfig true && git -C /workspace config --worktree core.hooksPath /tmp/setup-scripts/hooks
