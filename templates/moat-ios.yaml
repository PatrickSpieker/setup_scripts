runtime: apple
dependencies:
  - python
grants:
  - claude
  - github

hooks:
  post_build: git clone https://github.com/PatrickSpieker/setup_scripts.git /tmp/setup-scripts && mkdir -p ~/.claude && ln -sfn /tmp/setup-scripts/skills ~/.claude/skills && ln -sfn /tmp/setup-scripts/AGENTS.md ~/.claude/CLAUDE.md && cp /tmp/setup-scripts/defaults/settings.json ~/.claude/settings.json
  pre_run: >-
    git -C /workspace config extensions.worktreeConfig true &&
    git -C /workspace config --worktree core.hooksPath /tmp/setup-scripts/hooks &&
    cp /tmp/setup-scripts/scripts/ios-build-shim.sh /usr/local/bin/ios-build &&
    chmod +x /usr/local/bin/ios-build &&
    if [ -n "${MOAT_SIM_UDID:-}" ]; then echo "$MOAT_SIM_UDID" > /workspace/.moat-simulator-udid; fi
